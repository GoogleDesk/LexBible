<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexBrother — Design Directions</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #111; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // ── Shared mock data ──────────────────────────────────────────────────────
    const chapters = [
      { n: 1, title: 'Chapter 1: Foundations', meta: '1/1 cases briefed', done: true },
      { n: 2, title: 'Chapter 2: The Process for Determining Guilt', meta: '3/8 cases briefed', done: true },
      { n: 3, title: 'Chapter 3: Defining Criminal Conduct', meta: 'No content yet', done: false },
      { n: 4, title: 'Chapter 4: Rape', meta: 'No content yet', done: false },
    ];

    const courses = ['Civil Procedure', 'Constitutional Law', 'Criminal Law', 'Contracts', 'Property'];

    // ── OPTION A — Light Academia ─────────────────────────────────────────────
    const A = {
      bg:         '#F8F6F1',
      cardBg:     '#FFFFFF',
      border:     '#E2D9CC',
      sidebarBg:  '#F0EBE2',
      sidebarText:'#2C2010',
      sidebarSub: '#7A6A55',
      sidebarActive:'#FFFFFF',
      sidebarActiveBg:'rgba(42,96,73,0.12)',
      sidebarBar: '#2A6049',
      accent:     '#2A6049',
      accentLight:'#EDF4F0',
      accentBorder:'#A8CCBA',
      gold:       '#9A7B30',
      headingFont:'"Playfair Display", Georgia, serif',
      bodyFont:   'Georgia, serif',
      heading:    '#1A1714',
      text:       '#2C2416',
      subtext:    '#6B5F4A',
      tabActive:  '#1A1714',
      tabBorder:  '#2A6049',
      navLabel:   'rgba(44,32,16,0.45)',
      numBg:      '#2A6049',
      numColor:   '#FFFFFF',
      tagBg:      '#F0EBE2',
      tagBorder:  '#D0C4B0',
    };


    // ── OPTION C — Clean Modern ───────────────────────────────────────────────
    const C = {
      bg:         '#F7F8FA',
      cardBg:     '#FFFFFF',
      border:     '#E2E6EC',
      sidebarBg:  '#1E2B3C',
      sidebarText:'rgba(240,245,250,0.88)',
      sidebarSub: 'rgba(240,245,250,0.42)',
      sidebarActive:'#F0F5FA',
      sidebarActiveBg:'rgba(13,122,122,0.15)',
      sidebarBar: '#0D7A7A',
      accent:     '#0D7A7A',
      accentLight:'#E6F4F4',
      accentBorder:'#9DD0D0',
      gold:       '#C47A1A',
      headingFont:'"Playfair Display", Georgia, serif',
      bodyFont:   '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
      heading:    '#0D1B2A',
      text:       '#1E2B3C',
      subtext:    '#5A6B7A',
      tabActive:  '#0D1B2A',
      tabBorder:  '#0D7A7A',
      navLabel:   'rgba(240,245,250,0.42)',
      numBg:      '#0D7A7A',
      numColor:   '#FFFFFF',
      tagBg:      '#EEF0F3',
      tagBorder:  '#CDD2D9',
    };

    // ── OPTION B — Slate + Warm White ─────────────────────────────────────────
    const B = {
      bg:         '#FFFFFF',
      cardBg:     '#FFFFFF',
      border:     '#E8E2D4',
      sidebarBg:  '#3D4F6B',
      sidebarText:'rgba(248,244,236,0.88)',
      sidebarSub: 'rgba(248,244,236,0.45)',
      sidebarActive:'#F8F4EC',
      sidebarActiveBg:'rgba(184,150,46,0.12)',
      sidebarBar: '#B8962E',
      accent:     '#B8962E',
      accentLight:'#FDF3E0',
      accentBorder:'#E8D5A0',
      gold:       '#B8962E',
      headingFont:'"Playfair Display", Georgia, serif',
      bodyFont:   'Georgia, serif',
      heading:    '#1E2F52',
      text:       '#2C2416',
      subtext:    '#8B7355',
      tabActive:  '#1E2F52',
      tabBorder:  '#B8962E',
      navLabel:   'rgba(248,244,236,0.45)',
      numBg:      '#1E2F52',
      numColor:   '#FFFFFF',
      tagBg:      '#F8F4EC',
      tagBorder:  '#E0D8C8',
    };

    function MockApp({ t, label }) {
      const [activeTab, setActiveTab] = useState('textbook');
      const [activeCourse, setActiveCourse] = useState('Criminal Law');

      return (
        <div style={{ display:'flex', height:580, borderRadius:10, overflow:'hidden', border:`1px solid ${t.border}`, boxShadow:'0 8px 40px rgba(0,0,0,0.18)', fontFamily: t.bodyFont }}>

          {/* Sidebar */}
          <div style={{ width:210, background:t.sidebarBg, display:'flex', flexDirection:'column', flexShrink:0 }}>
            <div style={{ padding:'20px 18px 14px', borderBottom:`1px solid ${t.sidebarBar}22` }}>
              <div style={{ fontFamily:t.headingFont, fontSize:19, fontWeight:700, color:t.sidebarActive, letterSpacing:'-0.2px' }}>
                Lex<span style={{color:t.accent}}>Brother</span>
              </div>
              <div style={{ fontSize:9.5, color:t.navLabel, marginTop:3, textTransform:'uppercase', letterSpacing:'1.4px' }}>Law School Companion</div>
            </div>
            <div style={{ padding:'8px 0', flex:1 }}>
              <div style={{ fontSize:9.5, fontWeight:600, color:t.navLabel, letterSpacing:'1.8px', textTransform:'uppercase', padding:'6px 18px 3px' }}>Courses</div>
              {courses.map(c => {
                const active = c === activeCourse;
                return (
                  <div key={c} onClick={() => setActiveCourse(c)}
                    style={{ position:'relative', display:'flex', alignItems:'center', padding:'8px 10px 8px 18px', cursor:'pointer', background: active ? t.sidebarActiveBg : 'none' }}>
                    {active && <div style={{ position:'absolute', left:0, top:'18%', bottom:'18%', width:3, background:t.sidebarBar, borderRadius:'0 2px 2px 0' }} />}
                    <div>
                      <div style={{ fontSize:12.5, fontWeight:500, color: active ? t.sidebarActive : t.sidebarText }}>{c}</div>
                      {c === 'Criminal Law' && <div style={{ fontSize:10.5, color:t.sidebarSub, marginTop:1 }}>11 ch · 2/9 briefed</div>}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ padding:'10px 18px', borderTop:`1px solid ${t.sidebarBar}22`, display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:6, height:6, borderRadius:'50%', background:'#4A7C59' }} />
              <span style={{ fontSize:10.5, color:t.navLabel }}>1L · Spring 2026</span>
            </div>
          </div>

          {/* Main content */}
          <div style={{ flex:1, display:'flex', flexDirection:'column', background:t.bg, overflow:'hidden' }}>

            {/* Header */}
            <div style={{ padding:'18px 28px 0', borderBottom:`1px solid ${t.border}`, background:t.bg }}>
              <div style={{ display:'flex', alignItems:'center', marginBottom:14 }}>
                <span style={{ fontFamily:t.headingFont, fontSize:22, fontWeight:700, color:t.heading, letterSpacing:'-0.2px' }}>Criminal Law</span>
                <span style={{ display:'inline-block', width:1, height:16, background:t.border, margin:'0 14px 0 12px' }} />
                <button style={{ padding:'3px 9px', background:'none', border:`1px solid ${t.border}`, borderRadius:4, fontSize:11, color:t.subtext, cursor:'pointer', marginRight:6 }}>↺ Replace TOC</button>
                <button style={{ padding:'3px 9px', background:t.heading, border:'none', borderRadius:4, fontSize:11, color:'#FDFAF4', cursor:'pointer' }}>+ Add Chapter</button>
              </div>
              <div style={{ display:'flex', gap:0 }}>
                {['Textbook','Quizzes','Case Briefs'].map(tab => (
                  <button key={tab} onClick={() => setActiveTab(tab.toLowerCase())}
                    style={{ padding:'9px 20px', background:'none', border:'none', borderBottom:`2.5px solid ${activeTab === tab.toLowerCase() ? t.tabBorder : 'transparent'}`, cursor:'pointer', fontSize:13.5, color: activeTab === tab.toLowerCase() ? t.tabActive : t.subtext, fontWeight: activeTab === tab.toLowerCase() ? 700 : 500, fontFamily: t.bodyFont }}>
                    {tab}
                  </button>
                ))}
              </div>
            </div>

            {/* Content */}
            <div style={{ flex:1, overflowY:'auto', padding:'18px 28px' }}>
              {chapters.map(ch => (
                <div key={ch.n} style={{ background:t.cardBg, border:`1px solid ${t.border}`, borderRadius:8, marginBottom:6, padding:'14px 16px', display:'flex', alignItems:'center', gap:14 }}>
                  <div style={{ width:28, height:28, borderRadius:'50%', background:t.numBg, color:t.numColor, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11.5, fontWeight:700, flexShrink:0 }}>
                    {ch.n}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:t.headingFont, fontSize:15, fontWeight:700, color:t.heading }}>{ch.title}</div>
                    <div style={{ fontSize:12.5, marginTop:3, color: ch.done ? t.accent : t.gold, fontWeight: ch.done ? 400 : 500 }}>{ch.meta}</div>
                  </div>
                  <div style={{ display:'flex', gap:4 }}>
                    <button style={{ width:26, height:26, borderRadius:4, border:`1px solid ${t.border}`, background:'none', cursor:'pointer', fontSize:12, color:t.subtext }}>✎</button>
                    <button style={{ width:26, height:26, borderRadius:4, border:`1px solid ${t.border}`, background:'none', cursor:'pointer', fontSize:12, color:'#C0392B' }}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Quiz card preview ─────────────────────────────────────────────────────
    function MockQuiz({ t }) {
      const [chosen, setChosen] = useState(null);
      const correct = 'B';
      const choices = {
        A: 'At the discovery stage, through an interrogatory.',
        B: 'Before filing an answer, through a motion to dismiss.',
        C: 'After discovery concludes, through summary judgment.',
        D: 'During trial, as a motion for judgment as a matter of law.',
      };
      return (
        <div style={{ background:t.cardBg, border:`1px solid ${t.border}`, borderRadius:10, padding:'22px 24px', fontFamily:t.bodyFont, boxShadow:`0 2px 12px rgba(0,0,0,0.06)` }}>
          {/* Header */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <button style={{ padding:'5px 11px', background:t.cardBg, border:`1px solid ${t.border}`, borderRadius:5, fontSize:12.5, color:t.heading, cursor:'pointer', fontWeight:600 }}>← Prev</button>
              <span style={{ fontSize:12, color:t.subtext, fontWeight:500 }}>Q1 <span style={{opacity:0.5}}>of 20</span></span>
              <span style={{ fontSize:11.5, fontWeight:600, padding:'2px 8px', borderRadius:4, background:t.accentLight, color:t.accent }}>Application</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <button style={{ padding:'5px 9px', background:'none', border:`1px solid ${t.border}`, borderRadius:5, fontSize:13, cursor:'pointer' }}>🔖</button>
              <button style={{ padding:'5px 11px', background:t.heading, border:'none', borderRadius:5, fontSize:12.5, color:'#FDFAF4', cursor:'pointer', fontWeight:600 }}>Next →</button>
            </div>
          </div>
          {/* Question */}
          <div style={{ fontSize:16, color:t.heading, lineHeight:1.7, marginBottom:18, fontFamily:t.headingFont, fontWeight:400 }}>
            A plaintiff files a federal civil complaint. The defendant believes the complaint fails to state a legally sufficient cause of action. At what procedural stage should the defendant raise this argument?
          </div>
          {/* Choices */}
          {Object.entries(choices).map(([letter, text]) => {
            const isSelected = chosen === letter;
            const isCorrect  = letter === correct;
            const revealed   = chosen !== null;
            let bg = t.cardBg, border = t.border, opacity = 1;
            if (revealed) {
              if (isSelected && isCorrect)  { bg = '#EFF8F1'; border = '#4A7C59'; }
              else if (isSelected)           { bg = '#FEF0EE'; border = '#C0392B'; }
              else if (isCorrect && chosen !== correct) { bg = '#EFF8F1'; border = '#4A7C59'; }
              else                           { opacity = 0.42; }
            } else if (isSelected) { bg = t.accentLight; border = t.accent; }
            return (
              <div key={letter} onClick={() => setChosen(chosen === letter ? null : letter)}
                style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'10px 12px', borderRadius:7, border:`1.5px solid ${border}`, background:bg, cursor:'pointer', marginBottom:7, opacity, transition:'all .1s' }}>
                <div style={{ width:26, height:26, borderRadius:'50%', background: revealed ? (isCorrect ? '#4A7C59' : isSelected ? '#C0392B' : '#9BAAC0') : t.numBg, color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:12, flexShrink:0 }}>{letter}</div>
                <span style={{ fontSize:13.5, color:t.text, lineHeight:1.5, paddingTop:4 }}>{text}</span>
              </div>
            );
          })}
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas title="LexBrother — Design Directions">
          <DCSection id="apps" title="Full App Layout">
            <DCArtboard id="a-app" label="Option A — Light Academia" width={860} height={620}>
              <div style={{ padding:20, background:'#F0EBE0', height:'100%' }}>
                <MockApp t={A} label="A" />
              </div>
            </DCArtboard>
            <DCArtboard id="b-app" label="Option B — Slate + Warm White" width={860} height={620}>
              <div style={{ padding:20, background:'#E8E8E8', height:'100%' }}>
                <MockApp t={B} label="B" />
              </div>
            </DCArtboard>
            <DCArtboard id="c-app" label="Option C — Clean Modern" width={860} height={620}>
              <div style={{ padding:20, background:'#D8DCE2', height:'100%' }}>
                <MockApp t={C} label="C" />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="quiz" title="Quiz Question Card">
            <DCArtboard id="a-quiz" label="Option A" width={560} height={400}>
              <div style={{ padding:24, background:A.bg, height:'100%' }}>
                <MockQuiz t={A} />
              </div>
            </DCArtboard>
            <DCArtboard id="b-quiz" label="Option B" width={560} height={400}>
              <div style={{ padding:24, background:B.bg, height:'100%' }}>
                <MockQuiz t={B} />
              </div>
            </DCArtboard>
            <DCArtboard id="c-quiz" label="Option C" width={560} height={400}>
              <div style={{ padding:24, background:C.bg, height:'100%' }}>
                <MockQuiz t={C} />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="tokens" title="Color Tokens">
            <DCArtboard id="a-tokens" label="Option A — Light Academia" width={340} height={340}>
              <div style={{ padding:20, fontFamily:'Georgia,serif' }}>
                {[
                  ['Background', A.bg],['Card', A.cardBg],['Sidebar', A.sidebarBg],
                  ['Accent (Green)', A.accent],['Gold', A.gold],['Heading text', A.heading],
                  ['Body text', A.text],['Subtext', A.subtext],
                ].map(([name, hex]) => (
                  <div key={name} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                    <div style={{ width:32, height:32, borderRadius:6, background:hex, border:'1px solid rgba(0,0,0,.1)', flexShrink:0 }} />
                    <div>
                      <div style={{ fontSize:12, fontWeight:600, color:'#1A1714' }}>{name}</div>
                      <div style={{ fontSize:10.5, color:'#6B5F4A', fontFamily:'monospace' }}>{hex}</div>
                    </div>
                  </div>
                ))}
              </div>
            </DCArtboard>
            <DCArtboard id="c-tokens" label="Option C — Clean Modern" width={340} height={340}>
              <div style={{ padding:20, fontFamily:'sans-serif' }}>
                {[
                  ['Background', C.bg],['Card', C.cardBg],['Sidebar', C.sidebarBg],
                  ['Accent (Teal)', C.accent],['Warning Gold', C.gold],['Heading text', C.heading],
                  ['Body text', C.text],['Subtext', C.subtext],
                ].map(([name, hex]) => (
                  <div key={name} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                    <div style={{ width:32, height:32, borderRadius:6, background:hex, border:'1px solid rgba(0,0,0,.1)', flexShrink:0 }} />
                    <div>
                      <div style={{ fontSize:12, fontWeight:600, color:'#1A1714' }}>{name}</div>
                      <div style={{ fontSize:10.5, color:'#6B5F4A', fontFamily:'monospace' }}>{hex}</div>
                    </div>
                  </div>
                ))}
              </div>
            </DCArtboard>
            <DCArtboard id="b-tokens" label="Option B — Slate + Warm White" width={340} height={340}>
              <div style={{ padding:20, fontFamily:'Georgia,serif' }}>
                {[
                  ['Background', B.bg],['Card', B.cardBg],['Sidebar', B.sidebarBg],
                  ['Accent (Gold)', B.accent],['Heading text', B.heading],
                  ['Body text', B.text],['Subtext', B.subtext],['Border', B.border],
                ].map(([name, hex]) => (
                  <div key={name} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                    <div style={{ width:32, height:32, borderRadius:6, background:hex, border:'1px solid rgba(0,0,0,.1)', flexShrink:0 }} />
                    <div>
                      <div style={{ fontSize:12, fontWeight:600, color:'#1A1714' }}>{name}</div>
                      <div style={{ fontSize:10.5, color:'#6B5F4A', fontFamily:'monospace' }}>{hex}</div>
                    </div>
                  </div>
                ))}
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
